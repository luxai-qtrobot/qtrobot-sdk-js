<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QTRobot SDK — Microphone (WebRTC)</title>
  <link rel="stylesheet" href="../common.css" />
</head>
<body>

<header>
  <h1><span>QTRobot</span> SDK — Microphone (WebRTC)</h1>
  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
</header>

<div class="grid">

  <!-- ── Connection ── -->
  <div class="card" style="grid-column: 1 / -1">
    <h2>Connection</h2>
    <div class="row">
      <div style="flex:1">
        <label>Broker URL (MQTT signaling)</label>
        <input id="broker-uri" type="text" value="ws://10.231.0.2:9001" placeholder="wss://host:8084" />
      </div>
      <div style="flex:0 0 160px">
        <label>Robot ID</label>
        <input id="robot-id" type="text" value="QTRD000320" placeholder="QTRD000000" />
      </div>
      <div style="align-self:flex-end">
        <button id="btn-connect" class="primary" onclick="toggleConnect()">Connect</button>
      </div>
    </div>
    <div class="row">
      <div style="flex:0 0 160px">
        <label>MQTT Auth</label>
        <select id="auth-mode" onchange="onAuthModeChange()">
          <option value="none">none</option>
          <option value="username_password">user / pass</option>
        </select>
      </div>
      <div id="auth-user-wrap" style="flex:1;display:none">
        <label>Username</label>
        <input id="auth-username" type="text" placeholder="Username" />
      </div>
      <div id="auth-pass-wrap" style="flex:1;display:none">
        <label>Password</label>
        <input id="auth-password" type="password" placeholder="Password" />
      </div>
    </div>
    <div class="row">
      <div style="flex:1">
        <label>STUN server</label>
        <input id="stun-url" type="text" value="stun:stun.l.google.com:19302" placeholder="stun:host:port" />
      </div>
    </div>
    <div class="row">
      <div style="flex:2">
        <label>TURN server (optional)</label>
        <input id="turn-url" type="text" placeholder="turn:host:port" />
      </div>
      <div style="flex:1">
        <label>Username</label>
        <input id="turn-user" type="text" placeholder="Username" />
      </div>
      <div style="flex:1">
        <label>Credential</label>
        <input id="turn-pass" type="password" placeholder="Credential" />
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Robot Microphone</h2>
    <p class="hint">
      Streams the robot's internal microphone audio directly to the browser via
      WebRTC media track. Requires <code>use_media_channels=true</code> on the
      robot gateway (default).
    </p>
    <div class="row" style="justify-content:center;margin-top:8px">
      <button id="btn-mute" class="warn" disabled onclick="toggleMute()">Mute</button>
    </div>
    <audio id="audio-el" autoplay style="display:none"></audio>
    <div id="mic-log" class="log"><span style="color:#475569">— waiting —</span></div>
  </div>

</div>

<script src="../../../dist/qtrobot-sdk.umd.js"></script>
<script src="webrtc-connect.js"></script>
<script>
  const { Robot } = QTRobotSDK

  let robot  = null
  let muted  = false

  function ts() {
    return new Date().toLocaleTimeString('en-GB', { hour12: false })
  }

  function log(msg, isErr = false) {
    const el = document.getElementById('mic-log')
    el.innerHTML = `<div class="entry"><span class="ts">${ts()}</span><span class="${isErr ? 'err' : 'ok'}">${msg}</span></div>`
  }

  function setStatus(state, detail) {
    const dot  = document.getElementById('status-dot')
    const text = document.getElementById('status-text')
    const btn  = document.getElementById('btn-connect')

    dot.className    = state === 'connected' ? 'connected' : state === 'connecting' ? 'connecting' : ''
    text.textContent = detail ?? { connected: 'Connected', connecting: 'Connecting…', disconnected: 'Disconnected' }[state]
    btn.textContent  = state === 'connected' ? 'Disconnect' : 'Connect'
    btn.className    = state === 'connected' ? 'danger' : 'primary'
    btn.disabled     = state === 'connecting'
    document.getElementById('btn-mute').disabled = state !== 'connected'
  }

  async function toggleConnect() {
    if (robot) { await doDisconnect(); return }

    const broker  = document.getElementById('broker-uri').value.trim()
    const robotId = document.getElementById('robot-id').value.trim()
    if (!broker || !robotId) { alert('Enter broker URL and Robot ID.'); return }

    setStatus('connecting')
    try {
      robot = await Robot.connectWebrtcMqtt(broker, robotId, buildConnectOptions())
      setStatus('connected', `Connected to ${robot.robotId} (${robot.robotType ?? 'unknown'})`)

      log('Requesting audio track…')
      const track = await robot.extra.receiveAudioTrack('/mic/int/audio/ch0/stream:o')
      const audioEl = document.getElementById('audio-el')
      audioEl.srcObject = new MediaStream([track])
      muted = false
      document.getElementById('btn-mute').textContent = 'Mute'
      log('Streaming robot microphone audio.')
    } catch (err) {
      setStatus('disconnected')
      log(`Error: ${err.message}`, true)
    }
  }

  async function doDisconnect() {
    const audioEl = document.getElementById('audio-el')
    audioEl.srcObject = null
    robot?.close()
    robot = null
    muted = false
    document.getElementById('btn-mute').textContent = 'Mute'
    setStatus('disconnected')
    log('Disconnected.')
  }

  function toggleMute() {
    const audioEl = document.getElementById('audio-el')
    muted = !muted
    audioEl.muted = muted
    document.getElementById('btn-mute').textContent = muted ? 'Unmute' : 'Mute'
    log(muted ? 'Muted.' : 'Unmuted.')
  }
</script>
</body>
</html>
