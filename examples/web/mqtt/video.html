<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QTRobot SDK — Video (MQTT)</title>
  <link rel="stylesheet" href="../common.css" />
  <style>
    .alpha-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .alpha-row input[type="range"] {
      flex: 1;
      accent-color: #3b82f6;
      cursor: pointer;
    }
    .alpha-label {
      font-size: .85rem;
      font-weight: 600;
      color: #e2e8f0;
      min-width: 40px;
      text-align: right;
    }
  </style>
</head>
<body>

<header>
  <h1><span>QTRobot</span> SDK — Video (MQTT)</h1>
  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
</header>

<div class="grid">

  <!-- ── Connection ── -->
  <div class="card" style="grid-column: 1 / -1">
    <h2>Connection</h2>
    <div class="row">
      <div style="flex:1">
        <label>Broker URL</label>
        <input id="broker-uri" type="text" value="ws://10.231.0.2:9001" placeholder="ws://robot-ip:9001" />
      </div>
      <div style="flex:0 0 160px">
        <label>Robot ID</label>
        <input id="robot-id" type="text" value="QTRD000320" placeholder="QTRD000000" />
      </div>
      <div style="align-self:flex-end">
        <button id="btn-connect" class="primary" onclick="toggleConnect()">Connect</button>
      </div>
    </div>
    <div class="row">
      <div style="flex:0 0 160px">
        <label>Auth</label>
        <select id="auth-mode" onchange="onAuthModeChange()">
          <option value="none">none</option>
          <option value="username_password">user / pass</option>
        </select>
      </div>
      <div id="auth-user-wrap" style="flex:1;display:none">
        <label>Username</label>
        <input id="auth-username" type="text" placeholder="Username" />
      </div>
      <div id="auth-pass-wrap" style="flex:1;display:none">
        <label>Password</label>
        <input id="auth-password" type="password" placeholder="Password" />
      </div>
    </div>
  </div>

  <!-- ── Foreground video ── -->
  <div class="card">
    <h2>Foreground Video</h2>
    <p class="hint">Plays in the foreground lane. Supports alpha, pause, resume and cancel.</p>
    <div>
      <label>URI (file path on robot)</label>
      <input id="fg-uri" type="text" value="/home/qtrobot/robot/data/emotions/QT/happy.avi" />
    </div>
    <div class="alpha-row">
      <label style="margin:0;white-space:nowrap">Alpha</label>
      <input id="fg-alpha-slider" type="range" min="0" max="100" value="100"
        disabled oninput="onFgAlphaInput()" onchange="onFgAlphaChange()" />
      <span id="fg-alpha-label" class="alpha-label">100%</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
      <input id="fg-with-audio" type="checkbox" checked disabled />
      <label style="margin:0;cursor:pointer" for="fg-with-audio">Play with audio track</label>
    </div>
    <div class="row">
      <button id="fg-btn-play"   class="success" disabled onclick="toggleFg()">Play</button>
      <button id="fg-btn-pause"  class="warn"    disabled onclick="toggleFgPause()">Pause</button>
      <button id="fg-btn-cancel" class="danger"  disabled onclick="cancelFg()">Cancel</button>
    </div>
    <div id="fg-log" class="log"><span style="color:#475569">— waiting —</span></div>
  </div>

  <!-- ── Background video ── -->
  <div class="card">
    <h2>Background Video</h2>
    <p class="hint">Plays in the background lane simultaneously with foreground.</p>
    <div>
      <label>URI (file path on robot)</label>
      <input id="bg-uri" type="text" value="/home/qtrobot/robot/data/emotions/QT/kiss.avi" />
    </div>
    <div class="row">
      <button id="bg-btn-play"   class="success" disabled onclick="toggleBg()">Play</button>
      <button id="bg-btn-pause"  class="warn"    disabled onclick="toggleBgPause()">Pause</button>
      <button id="bg-btn-cancel" class="danger"  disabled onclick="cancelBg()">Cancel</button>
    </div>
    <div id="bg-log" class="log"><span style="color:#475569">— waiting —</span></div>
  </div>

</div>

<script src="../../../dist/qtrobot-sdk.umd.js"></script>
<script src="mqtt-connect.js"></script>
<script>
  const { Robot } = QTRobotSDK

  let robot        = null
  let fgController = null
  let bgController = null
  let fgPaused     = false
  let bgPaused     = false

  function ts() {
    return new Date().toLocaleTimeString('en-GB', { hour12: false })
  }

  function log(logId, msg, isErr = false) {
    const el = document.getElementById(logId)
    el.innerHTML = `<div class="entry"><span class="ts">${ts()}</span><span class="${isErr ? 'err' : 'ok'}">${msg}</span></div>`
  }

  function setStatus(state, detail) {
    const dot      = document.getElementById('status-dot')
    const text     = document.getElementById('status-text')
    const btn      = document.getElementById('btn-connect')
    const controls = [
      'fg-btn-play','fg-btn-pause','fg-btn-cancel','fg-alpha-slider','fg-with-audio',
      'bg-btn-play','bg-btn-pause','bg-btn-cancel',
    ]

    dot.className    = state === 'connected' ? 'connected' : state === 'connecting' ? 'connecting' : ''
    text.textContent = detail ?? { connected: 'Connected', connecting: 'Connecting…', disconnected: 'Disconnected' }[state]
    btn.textContent  = state === 'connected' ? 'Disconnect' : 'Connect'
    btn.className    = state === 'connected' ? 'danger' : 'primary'
    btn.disabled     = state === 'connecting'
    controls.forEach(id => document.getElementById(id).disabled = state !== 'connected')
  }

  async function toggleConnect() {
    if (robot) { await doDisconnect(); return }

    const broker  = document.getElementById('broker-uri').value.trim()
    const robotId = document.getElementById('robot-id').value.trim()
    if (!broker || !robotId) { alert('Enter broker URL and Robot ID.'); return }

    setStatus('connecting')
    try {
      robot = await Robot.connectMqtt(broker, robotId, buildMqttConnectOptions())
      setStatus('connected', `Connected to ${robot.robotId} (${robot.robotType ?? 'unknown'})`)
    } catch (err) {
      setStatus('disconnected')
      alert(`Connection failed: ${err.message}`)
    }
  }

  async function doDisconnect() {
    fgController?.abort(); fgController = null
    bgController?.abort(); bgController = null
    robot?.close(); robot = null
    setStatus('disconnected')
  }

  function onFgAlphaInput() {
    document.getElementById('fg-alpha-label').textContent =
      `${document.getElementById('fg-alpha-slider').value}%`
  }
  async function onFgAlphaChange() {
    const pct = parseInt(document.getElementById('fg-alpha-slider').value)
    try {
      await robot.media.setFgVideoAlpha({ value: pct / 100 })
      log('fg-log', `FG alpha: ${pct}%`)
    } catch (err) { log('fg-log', `Error: ${err.message}`, true) }
  }

  async function toggleFg() {
    if (fgController) { cancelFg(); return }

    const uri        = document.getElementById('fg-uri').value.trim()
    const with_audio = document.getElementById('fg-with-audio').checked
    if (!uri) { alert('Enter a URI.'); return }

    fgController = new AbortController()
    fgPaused = false
    document.getElementById('fg-btn-play').textContent  = 'Stop'
    document.getElementById('fg-btn-play').className    = 'danger'
    document.getElementById('fg-btn-pause').textContent = 'Pause'
    log('fg-log', `Playing FG: ${uri}`)

    try {
      const ok = await robot.media.playFgVideoFile({ uri, with_audio, signal: fgController.signal })
      if (ok === false) log('fg-log', 'FG: file not found or playback failed.', true)
      else log('fg-log', 'FG: done.')
    } catch (err) {
      if (err.name === 'AbortError' || err.message?.includes('cancel')) log('fg-log', 'FG: cancelled.')
      else log('fg-log', `FG error: ${err.message}`, true)
    } finally {
      fgController = null; fgPaused = false
      document.getElementById('fg-btn-play').textContent  = 'Play'
      document.getElementById('fg-btn-play').className    = 'success'
      document.getElementById('fg-btn-pause').textContent = 'Pause'
    }
  }

  async function toggleFgPause() {
    if (!fgController) return
    try {
      if (!fgPaused) {
        await robot.media.pauseFgVideoFile(); fgPaused = true
        document.getElementById('fg-btn-pause').textContent = 'Resume'
        log('fg-log', 'FG: paused.')
      } else {
        await robot.media.resumeFgVideoFile(); fgPaused = false
        document.getElementById('fg-btn-pause').textContent = 'Pause'
        log('fg-log', 'FG: resumed.')
      }
    } catch (err) { log('fg-log', `Error: ${err.message}`, true) }
  }

  function cancelFg() {
    if (fgController) { fgController.abort(); fgController = null }
  }

  async function toggleBg() {
    if (bgController) { cancelBg(); return }

    const uri = document.getElementById('bg-uri').value.trim()
    if (!uri) { alert('Enter a URI.'); return }

    bgController = new AbortController()
    bgPaused = false
    document.getElementById('bg-btn-play').textContent  = 'Stop'
    document.getElementById('bg-btn-play').className    = 'danger'
    document.getElementById('bg-btn-pause').textContent = 'Pause'
    log('bg-log', `Playing BG: ${uri}`)

    try {
      const ok = await robot.media.playBgVideoFile({ uri, signal: bgController.signal })
      if (ok === false) log('bg-log', 'BG: file not found or playback failed.', true)
      else log('bg-log', 'BG: done.')
    } catch (err) {
      if (err.name === 'AbortError' || err.message?.includes('cancel')) log('bg-log', 'BG: cancelled.')
      else log('bg-log', `BG error: ${err.message}`, true)
    } finally {
      bgController = null; bgPaused = false
      document.getElementById('bg-btn-play').textContent  = 'Play'
      document.getElementById('bg-btn-play').className    = 'success'
      document.getElementById('bg-btn-pause').textContent = 'Pause'
    }
  }

  async function toggleBgPause() {
    if (!bgController) return
    try {
      if (!bgPaused) {
        await robot.media.pauseBgVideoFile(); bgPaused = true
        document.getElementById('bg-btn-pause').textContent = 'Resume'
        log('bg-log', 'BG: paused.')
      } else {
        await robot.media.resumeBgVideoFile(); bgPaused = false
        document.getElementById('bg-btn-pause').textContent = 'Pause'
        log('bg-log', 'BG: resumed.')
      }
    } catch (err) { log('bg-log', `Error: ${err.message}`, true) }
  }

  function cancelBg() {
    if (bgController) { bgController.abort(); bgController = null }
  }
</script>
</body>
</html>
